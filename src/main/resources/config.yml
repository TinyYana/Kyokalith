# Kyokalith 主設定(v0.4 誘餌模型)
# 原版世界生成礦保留當誘餌,完全埋藏的座標在首次曝露時由決定性礦脈函數決算;
# 沒有 chunk 掃描、沒有 datapack 抹礦。礦脈函數、eligible token、d20 bridge
# 與 NatureRevive epoch 整合都在程式內實作。

database:
  file: kyokalith.db
  dirty_flush_interval_ticks: 40

# dimension 對應 Bukkit World.Environment(NORMAL/NETHER/THE_END),省略預設 NORMAL,
# 且是精確比對——所以省略 = 只在主世界命中,下界礦種務必明確標 NETHER。
# enabled: false 的礦種 Kyokalith 完全不管:誘餌保持原版、挖掘走原版、不觸發檢定。
ores:
  coal:
    enabled: true
    materials:
      stone: COAL_ORE
      deepslate: DEEPSLATE_COAL_ORE
    y_min: 0
    y_max: 320
    preferred_y: 96
    density: 1.0
    vein_size_min: 1
    vein_size_max: 10
    cell_chance: 0.045
