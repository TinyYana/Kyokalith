# Kyokalith main config (decoy model)
# Vanilla world-gen ores are kept as decoys; a fully buried position is resolved by a
# deterministic vein function at its first exposure. World generation is never touched
# and nothing is scanned — the only block writes happen at the moment of first exposure.
# The vein function, eligible ore tokens, OreCheckTriggerEvent and the NatureRevive
# epoch bridge are all implemented in-plugin.

# Locale for admin command output. Bundled: en, zh_TW.
# Files under plugins/Kyokalith/lang/<locale>.yml override the bundled text key-by-key;
# add your own lang/<name>.yml and point locale at it for a custom language.
locale: en

database:
  file: kyokalith.db
  dirty_flush_interval_ticks: 40

# dimension maps to Bukkit World.Environment (NORMAL/NETHER/THE_END). Omitted = NORMAL,
# and the match is exact — nether ore types must explicitly say NETHER.
# Ore types with enabled: false are fully ignored: decoys stay vanilla, mining is vanilla,
# and no OreCheckTriggerEvent fires.
ores:
  coal:
    enabled: true
    materials:
      stone: COAL_ORE
      deepslate: DEEPSLATE_COAL_ORE
    y_min: 0
    y_max: 320
    preferred_y: 96
    density: 1.0
    vein_size_min: 1
    vein_size_max: 10
    cell_chance: 0.045
