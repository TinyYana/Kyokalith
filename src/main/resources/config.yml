  # 2026-07-24 recalibrated (see docs/KYOKALITH_SPEC.md handoff notes / commit message for the
  # full Monte Carlo derivation): cell_chance was 0.006 (the lowest of any ore) and vein_size_max
  # was 2, which together measured out to ~0.02-0.24 hits per 10,000 sampled blocks across the
  # whole y8-119 range — i.e. functionally absent, not just rare. That's the real root cause of
  # "ancient debris is basically unfindable in the y8-22 layer" reports; y_min/y_max/preferred_y
  # already matched vanilla's shape and were left untouched. cell_chance 0.006->0.05 (~8x) and
  # vein_size_max 2->3 (matching vanilla's real per-vein block count of 3 for both of its
  # overlapping distributions) measured ~0.6-1.0 hits/10k in the y8-22 band — clearly rarer than
  # nether_quartz/nether_gold's own measured peak density (~3.4/10k and ~1.4/10k at y60) but no
  # longer indistinguishable from zero. Remember this is *only* the blind-dig-into-buried-decoy
  # contribution: most of what a player actually finds at y15 is real, already-exposed vanilla
  # ancient debris on cave/ravine walls (WORLDGEN_EXPOSED, untouched by this plugin) — this value
  # only had to stop being ~zero, not carry the entire "findable in 10-20 minutes" experience alone.
  ancient_debris:
    enabled: true
    dimension: NETHER
    materials:
      stone: ANCIENT_DEBRIS
    y_min: 8
    y_max: 119
    preferred_y: 15
    density: 1.0
    vein_size_min: 1
    vein_size_max: 3
    cell_chance: 0.05
    priority: 90
