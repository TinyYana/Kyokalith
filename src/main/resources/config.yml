  coal:
    enabled: true
    materials:
      stone: COAL_ORE
      deepslate: DEEPSLATE_COAL_ORE
    y_min: 0
    y_max: 320
    preferred_y: 96
    density: 1.0
    vein_size_min: 1
    vein_size_max: 10
    cell_chance: 0.045
    priority: 10
