# Kyokalith 主設定
# datapack/kyokalith-strip-ores 提供正式世界生成抹礦;strip_existing_chunks 負責舊世界遷移。
# 礦脈函數、曝露掃描、eligible token、d20 bridge 與 NatureRevive epoch 整合已在程式內實作。

database:
  file: kyokalith.db
  dirty_flush_interval_ticks: 40

materialization:
  scan_blocks_per_tick: 1024
  strip_existing_chunks: true

