name: Kyokalith
description: '$description'
prefix: Kyokalith
version: '${version}'

main: com.tinyyana.kyokalith.KyokalithPlugin
api-version: '26.2'
load: POSTWORLD
softdepend: [ NatureRevive ]

authors: [ TinyYana ]
website: https://tinyyana.com

# Paper library loader:runtime 依賴不 shade,啟動時從 Maven Central 下載
# kotlin 版本必須跟 gradle/libs.versions.toml 的 kotlin 一致
libraries:
  - org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.4.20-Beta1
  - org.xerial:sqlite-jdbc:3.49.1.0

commands:
  kyokalith:
    description: Kyokalith 管理指令
    aliases: [ kyo ]
    usage: /kyo stats

permissions:
  kyokalith.admin:
    description: 管理子指令(stats 等)
    default: op
  kyokalith.bypass:
    description: 跳過 Kyokalith eligible ore 消耗流程
    default: false
