name: Kyokalith
description: '$description'
prefix: Kyokalith
version: '${version}'

main: com.tinyyana.kyokalith.KyokalithPlugin
api-version: '26.1'
load: POSTWORLD
softdepend: [ NatureRevive ]

folia-supported: true

authors: [ TinyYana ]
website: https://tinyyana.com

# Bukkit library loader(Spigot/Paper 皆支援):runtime 依賴不 shade,啟動時從 Maven Central 下載
# kotlin 版本必須跟 gradle/libs.versions.toml 的 kotlin 一致
libraries:
  - org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.4.0
  - org.xerial:sqlite-jdbc:3.49.1.0

commands:
  kyokalith:
    description: Kyokalith admin commands
    aliases: [ kyo ]
    usage: /kyo stats

permissions:
  kyokalith.admin:
    description: All /kyo admin subcommands
    default: op
  kyokalith.bypass:
    description: Holder's mining skips the eligible-ore token flow (decoy resolution still runs)
    default: false
