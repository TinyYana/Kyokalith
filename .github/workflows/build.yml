name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Action 版本說明:每一顆都取「第一個真正跑在 Node 24 的 major」,不是最新 major。
# GitHub 已停止在 runner 上支援 Node 20(舊版會被強制降轉並印 deprecation 警告)。
# upload-artifact 要 v6(v5 只是「預備支援」Node 24,預設仍跑 Node 20)。
# 硬性需求是 runner >= 2.327.1(ubuntu-latest 已滿足)。
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 只有 tag push 的 release step 用到;PR 的 token 本來就是唯讀
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v5

      # build 同時跑單元測試,其中包含 DocsCoverageTest:
      # plugin.yml 宣告的指令與權限,必須出現在 README.md / docs/*.md 裡。
      # 加了功能沒寫文件,這一步就會紅。
      - name: Build (compile + unit tests + docs coverage + jar)
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: Kyokalith-test-report
          path: build/reports/tests/test
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v6
        with:
          name: Kyokalith-jar
          path: |
            build/libs/*.jar
            !build/libs/*-thin.jar
          if-no-files-found: error

      # push tag vX.Y.Z → 自動發 GitHub Release 附 jar,notes 抽自 CHANGELOG.md 的對應段落。
      # 兩道防呆:①tag 與 gradle.properties 的 version 不一致就 fail;
      # ②CHANGELOG.md 沒有該版段落也 fail——寧可 release 失敗,也不要發一個沒人看得懂的空 release。
      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
          if [ "v$VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME does not match gradle.properties version $VERSION"; exit 1
          fi
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) { found=1; next } }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "CHANGELOG.md has no section for $VERSION — write it before tagging"; exit 1
          fi
          JAR=$(ls build/libs/*.jar | grep -v -- '-thin')
          gh release create "$GITHUB_REF_NAME" "$JAR" --title "Kyokalith $GITHUB_REF_NAME" --notes-file release-notes.md
